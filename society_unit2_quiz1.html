    function init() {
        const tfArea = document.getElementById('tfContainer');
        tfQuestions.forEach((q, i) => {
            tfArea.innerHTML += `
                <div class="question-block">
                    <span class="question-title">${i + 1}. ${q.q}</span>
                    <div class="options">
                        <label><input type="radio" name="tf${i}" value="T"> 正確 (○)</label>
                        <label><input type="radio" name="tf${i}" value="F"> 錯誤 (╳)</label>
                    </div>
                </div>`;
        });

        const mcArea = document.getElementById('mcContainer');
        mcQuestions.forEach((q, i) => {
            let opts = q.options.map((opt, idx) => `
                <label><input type="radio" name="mc${i}" value="${idx}"> ${idx+1}. ${opt}</label>
            `).join('');
            mcArea.innerHTML += `
                <div class="question-block">
                    <span class="question-title">${i + 1}. ${q.q}</span>
                    <div class="options">${opts}</div>
                </div>`;
        });
    }

    function submitQuiz() {
        let totalScore = 0;
        let reviewHtml = '<h2>錯題回顧與解析</h2>';
        let wrongCount = 0;
        let mistakes = [];

        // Check TF
        tfQuestions.forEach((item, i) => {
            const selected = document.querySelector(`input[name="tf${i}"]:checked`);
            const userAns = selected ? selected.value : null;
            if (userAns === item.a) {
                totalScore += 2;
            } else {
                wrongCount++;
                const userDisplay = userAns === "T" ? "○" : (userAns === "F" ? "╳" : "未答");
                const correctDisplay = item.a === "T" ? "○" : "╳";
                reviewHtml += createReviewItem(i+1, "是非題", item.q, userDisplay, correctDisplay, item.ex);
                mistakes.push({ question: item.q, user: userDisplay, correct: correctDisplay });
            }
        });

        // Check MC
        mcQuestions.forEach((item, i) => {
            const selected = document.querySelector(`input[name="mc${i}"]:checked`);
            const userAns = selected ? parseInt(selected.value) : null;
            if (userAns === item.a) {
                totalScore += 2;
            } else {
                wrongCount++;
                const userDisplay = userAns === null ? "未答" : item.options[userAns];
                const correctDisplay = item.options[item.a];
                reviewHtml += createReviewItem(i+1, "選擇題", item.q, userDisplay, correctDisplay, item.ex);
                mistakes.push({ question: item.q, user: userDisplay, correct: correctDisplay });
            }
        });

        // Save to History
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        history.push({
            date: new Date().toLocaleString(),
            score: totalScore,
            total: 100,
            mistakes: mistakes
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));

        document.getElementById('scoreText').innerHTML = `您的總分：${totalScore} / 100`;
        document.getElementById('reviewArea').innerHTML = wrongCount > 0 ? reviewHtml : '<p style="color:green; text-align:center; font-size:1.5em;">恭喜你！全部答對了！</p>';
        document.getElementById('result').style.display = 'block';
        displayHistory();
        window.scrollTo({ top: document.getElementById('result').offsetTop, behavior: 'smooth' });
    }

    function displayHistory() {
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        const historyList = document.getElementById('historyList');
        if (history.length === 0) {
            historyList.innerHTML = "尚無測驗紀錄";
            return;
        }
        historyList.innerHTML = history.slice().reverse().map((item, idx) => `
            <div class="history-item">
                <strong>第 ${history.length - idx} 次測驗 - ${item.date}</strong><br>
                得分：<span style="color: #27ae60; font-weight: bold;">${item.score} / ${item.total}</span>
                <details style="margin-top: 10px;">
                    <summary style="cursor: pointer; color: #1a5276;">查看詳情</summary>
                    <div style="margin-top: 10px; font-size: 0.9em; border-top: 1px solid #eee; padding-top: 10px;">
                        ${item.mistakes.length > 0 ? item.mistakes.map(m => `
                            <p style="margin-bottom: 8px;">
                                <strong>問：</strong>${m.question}<br>
                                <span style="color: #e74c3c;">答：${m.user}</span> | <span style="color: #27ae60;">正：${m.correct}</span>
                            </p>
                        `).join('') : "全部正確！"}
                    </div>
                </details>
            </div>
        `).join('');
    }

    function clearHistory() {
        if (confirm("確定要清除所有測驗紀錄嗎？")) {
            localStorage.removeItem(STORAGE_KEY);
            displayHistory();
        }
    }

    function createReviewItem(no, type, q, user, correct, ex) {
        return `
            <div class="wrong-item">
                <strong>[${type} 第 ${no} 題]</strong> ${q}
                <div class="user-ans-wrong">您的回答：${user}</div>
                <div class="correct-ans">正確答案：${correct}</div>
                <div class="explanation">💡 學習點：${ex}</div>
            </div>`;
    }

    window.onload = function() {
        init();
        displayHistory();
    };
</script>

</body>
</html>
