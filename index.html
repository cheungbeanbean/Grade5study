<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
            transition: background-color 0.3s, color 0.3s;
        }
        .dark-mode {
            background-color: #1a1a1a;
            color: #e8e8e8;
        }
        .toggle {
            position: fixed;
            top: 10px;
            right: 10px;
            background-color: #ccc;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
        .quiz-container {
            margin: 20px;
        }
    </style>
</head>
<body>
    <button class="toggle" onclick="toggleMode()">Toggle Dark Mode</button>
    <div class="quiz-container">
        <h1>Star Quiz</h1>
        <form id="quiz-form">
            <div>
                <label for="q1">1. What is the closest star to Earth?</label><br>
                <input type="radio" name="q1" value="a"> A) Proxima Centauri<br>
                <input type="radio" name="q1" value="b"> B) Alpha Centauri A<br>
                <input type="radio" name="q1" value="c"> C) Sirius<br>
                <input type="radio" name="q1" value="d"> D) Betelgeuse<br>
            </div>
            <!-- Additional 19 questions go here -->
            <input type="submit" value="Submit">
        </form>
        <div id="score-container" style="display:none;"></div>
    </div>
    <script>
        function toggleMode() {
            document.body.classList.toggle('dark-mode');
        }
        document.getElementById('quiz-form').onsubmit = function(event) {
            event.preventDefault();
            // Scoring logic goes here
            const score = 0; // Placeholder for actual score
            document.getElementById('score-container').innerText = `Your score: ${score}`;
            document.getElementById('score-container').style.display = 'block';
        };
    </script>
</body>
</html>
