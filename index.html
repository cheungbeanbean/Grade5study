<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五年級測驗中心</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --container-bg: #ffffff;
            --text-color: #2c3e50;
            --btn-bg: #3498db;
            --science-color: #e74c3c;
            --english-color: #f39c12;
            --math-color: #27ae60;
        }

        [data-theme='dark'] {
            --bg-color: #1a1a2e;
            --container-bg: #16213e;
            --text-color: #e0e0e0;
            --btn-bg: #0077b6;
            --science-color: #ff4d4d;
            --english-color: #ffb84d;
            --math-color: #4ade80;
        }

        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            padding: 20px; 
            line-height: 1.6; 
            transition: all 0.3s ease;
        }

        .theme-toggle { 
            text-align: right; 
            margin-bottom: 20px; 
        }

        #themeBtn { 
            padding: 8px 15px; 
            cursor: pointer; 
            border-radius: 20px; 
            border: 1px solid var(--btn-bg); 
            background: transparent; 
            color: var(--text-color); 
        }

        .container { 
            max-width: 900px; 
            margin: auto; 
            background: var(--container-bg); 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }

        h1 { 
            text-align: center; 
            color: var(--text-color); 
            margin-bottom: 40px;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .subject-card {
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            color: white;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .subject-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .science-card {
            background: linear-gradient(135deg, var(--science-color), #c0392b);
        }

        .english-card {
            background: linear-gradient(135deg, var(--english-color), #d68910);
        }

        .math-card {
            background: linear-gradient(135deg, var(--math-color), #1e8449);
        }

        .subject-card h2 {
            margin-top: 0;
            font-size: 28px;
        }

        .subject-card p {
            margin: 10px 0 0 0;
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="theme-toggle">
    <button id="themeBtn" onclick="toggleTheme()">🌙 暗色模式</button>
</div>

<div class="container">
    <h1>📚 五年級測驗中心</h1>
    
    <div class="subjects-grid">
        <a href="science.html" class="subject-card science-card">
            <h2>🌠</h2>
            <h2>自然</h2>
            <p>探索科學世界</p>
        </a>
        
        <a href="english.html" class="subject-card english-card">
            <h2>🌍</h2>
            <h2>英文</h2>
            <p>學習英語知識</p>
        </a>
        
        <a href="math.html" class="subject-card math-card">
            <h2>🔢</h2>
            <h2>數學</h2>
            <p>挑戰數學問題</p>
        </a>
    </div>
</div>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        const btn = document.getElementById('themeBtn');
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        html.setAttribute('data-theme', newTheme);
        btn.textContent = newTheme === 'dark' ? '☀️ 亮色模式' : '🌙 暗色模式';
        localStorage.setItem('theme', newTheme);
    }

    window.addEventListener('DOMContentLoaded', function() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        const btn = document.getElementById('themeBtn');
        if (savedTheme === 'dark') btn.textContent = '☀️ 亮色模式';
    });
</script>

</body>
</html>
