<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五年級數學：小數乘法單元測驗</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
        }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg-color); color: var(--primary-color); line-height: 1.6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: var(--primary-color); }
        .quiz-info { background: #eef2f3; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        .question-block { border-bottom: 1px solid #eee; padding: 20px 0; }
        .question-text { font-size: 1.1em; margin-bottom: 15px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input[type="radio"] { margin-right: 10px; cursor: pointer; }
        button { cursor: pointer; transition: 0.3s; border: none; border-radius: 5px; }
        .submit-btn { display: block; width: 100%; padding: 15px; background: var(--success-color); color: white; font-size: 1.2em; margin-top: 30px; }
        .submit-btn:hover { background: #219150; }
        
        /* 歷史紀錄區塊 */
        .history-section { margin-top: 50px; border-top: 3px solid var(--primary-color); padding-top: 20px; }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .history-table th, .history-table td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .history-table th { background: #f8f9fa; }
        .detail-btn { background: var(--accent-color); color: white; padding: 5px 10px; }
        .clear-btn { background: var(--error-color); color: white; padding: 8px 15px; float: right; margin-bottom: 10px; }
        
        /* 彈窗樣式 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 80%; max-height: 80vh; overflow-y: auto; border-radius: 10px; }
        .wrong-item { color: var(--error-color); margin-bottom: 10px; border-left: 4px solid var(--error-color); padding-left: 10px; }
        .back-link { display: block; margin-bottom: 20px; text-decoration: none; color: var(--accent-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <a href="math.html" class="back-link">⬅ 返回數學目錄</a>
    <h1>📐 五年級數學：小數乘法</h1>
    <div class="quiz-info">學生姓名：<input type="text" id="studentName" placeholder="請輸入姓名"></div>
    
    <div id="quizContainer">
        </div>

    <button class="submit-btn" onclick="submitQuiz()">提交測驗並儲存紀錄</button>

    <div class="history-section">
        <button class="clear-btn" onclick="clearHistory()">清除所有紀錄</button>
        <h2>📊 測驗紀錄回顧 (教師專用)</h2>
        <table class="history-table">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>姓名</th>
                    <th>得分</th>
                    <th>詳情</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">錯題詳情</h2>
        <div id="modalBody"></div>
        <button onclick="closeModal()" style="margin-top:20px; padding:10px 20px; background:#95a5a6; color:white;">關閉</button>
    </div>
</div>

<script>
const quizData = [
    // 觀念題
    { q: "0.6 × 0.8 的積是多少？", a: ["4.8", "0.48", "0.048", "48"], c: 1 },
    { q: "1.25 × 0.4 的積，其小數點後有幾位有效數字？", a: ["1位", "2位", "3位", "沒有"], c: 0 },
    { q: "4.2 × 0.15 與 42 × 1.5 的結果相比？", a: ["前者大", "後者大", "一樣大", "無法比較"], c: 1 },
    { q: "已知 48 × 72 = 3456，則 0.48 × 7.2 = ？", a: ["34.56", "3.456", "345.6", "0.3456"], c: 1 },
    { q: "下列哪一個算式的積比 6.5 小？", a: ["6.5 × 1.2", "6.5 × 1.0", "6.5 × 0.99", "6.5 × 1.01"], c: 2 },
    { q: "0.5 × 0.5 的積是多少？", a: ["2.5", "0.25", "0.025", "25"], c: 1 },
    { q: "3.6 的 0.1 倍是多少？", a: ["36", "0.36", "3.6", "0.036"], c: 1 },
    { q: "12.5 × 0.8 的結果是多少？", a: ["100", "1", "10", "0.1"], c: 2 },
    { q: "0.05 × 0.08 的積是多少？", a: ["0.4", "0.04", "0.004", "0.0004"], c: 2 },
    { q: "被乘數大於0時，當乘數小於1，積會如何？", a: ["比被乘數大", "比被乘數小", "等於被乘數", "等於1"], c: 1 },
    
    // 計算與應用題
    { q: "一公升汽油 28.5 元，加 10 公升要多少元？", a: ["285", "2.85", "2850", "0.285"], c: 0 },
    { q: "長 6.5 公分、寬 4.8 公分的長方形面積是多少平方公分？", a: ["31.2", "3.12", "312", "30.2"], c: 0 },
    { q: "一包糖重 0.45 公斤，3 包共重多少公斤？", a: ["1.25", "1.35", "13.5", "1.45"], c: 1 },
    { q: "1.5 × 0.6 = ？", a: ["9", "0.9", "0.09", "90"], c: 1 },
    { q: "4.2 × 0.25 = ？", a: ["10.5", "1.05", "105", "0.105"], c: 1 },
    { q: "3.14 × 1.2 = ？", a: ["3.768", "37.68", "0.3768", "376.8"], c: 0 },
    { q: "0.18 × 0.5 = ？", a: ["0.9", "0.09", "0.009", "9"], c: 1 },
    { q: "每公斤蘋果 65.5 元，買 1.8 公斤要多少元？", a: ["117.9", "11.79", "1179", "118"], c: 0 },
    { q: "2.46 × 3.5 = ？", a: ["86.1", "8.61", "0.861", "861"], c: 1 },
    { q: "0.125 × 80 = ？", a: ["1", "10", "100", "0.1"], c: 1 }
];

// 初始化題目
function initQuiz() {
    const container = document.getElementById('quizContainer');
    quizData.forEach((data, index) => {
        const div = document.createElement('div');
        div.className = 'question-block';
        div.innerHTML = `
            <div class="question-text">${index + 1}. ${data.q}</div>
            <div class="options-grid">
                ${data.a.map((opt, i) => `
                    <label><input type="radio" name="q${index}" value="${i}"> ${opt}</label>
                `).join('')}
            </div>
        `;
        container.appendChild(div);
    });
    renderHistory();
}

// 提交測驗
function submitQuiz() {
    const name = document.getElementById('studentName').value || "無名氏";
    let score = 0;
    let mistakes = [];

    quizData.forEach((data, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const userAns = selected ? parseInt(selected.value) : -1;
        
        if (userAns === data.c) {
            score += (100 / quizData.length);
        } else {
            mistakes.push({
                qNum: index + 1,
                question: data.q,
                userAnswer: userAns === -1 ? "未作答" : data.a[userAns],
                correctAnswer: data.a[data.c]
            });
        }
    });

    const record = {
        name: name,
        date: new Date().toLocaleString(),
        score: Math.round(score),
        mistakes: mistakes
    };

    saveRecord(record);
    alert(`測驗完成！你的得分是：${record.score}`);
    location.reload(); // 重新整理以更新儀表板
}

// 儲存至 LocalStorage
function saveRecord(record) {
    let history = JSON.parse(localStorage.getItem('mathHistory')) || [];
    history.push(record);
    localStorage.setItem('mathHistory', JSON.stringify(history));
}

// 渲染歷史紀錄
function renderHistory() {
    const history = JSON.parse(localStorage.getItem('mathHistory')) || [];
    const tbody = document.getElementById('historyBody');
    tbody.innerHTML = history.reverse().map((rec, index) => `
        <tr>
            <td>${rec.date}</td>
            <td>${rec.name}</td>
            <td>${rec.score}</td>
            <td><button class="detail-btn" onclick="showDetail(${history.length - 1 - index})">查看詳情</button></td>
        </tr>
    `).join('');
}

// 顯示錯題詳情
function showDetail(index) {
    const history = JSON.parse(localStorage.getItem('mathHistory'));
    const record = history[index];
    const modal = document.getElementById('detailModal');
    const body = document.getElementById('modalBody');
    
    document.getElementById('modalTitle').innerText = `${record.name} 的錯題分析 (得分: ${record.score})`;
    
    if (record.mistakes.length === 0) {
        body.innerHTML = "<p style='color:green;'>太棒了！全對！</p>";
    } else {
        body.innerHTML = record.mistakes.map(m => `
            <div class="wrong-item">
                <strong>第 ${m.qNum} 題：${m.question}</strong><br>
                你的答案：<span style="color:gray">${m.userAnswer}</span> | 
                正確答案：<strong>${m.correctAnswer}</strong>
            </div>
        `).join('');
    }
    modal.style.display = "block";
}

function closeModal() {
    document.getElementById('detailModal').style.display = "none";
}

function clearHistory() {
    if (confirm("確定要刪除所有測驗紀錄嗎？此動作無法復原。")) {
        localStorage.removeItem('mathHistory');
        renderHistory();
    }
}

window.onload = initQuiz;
</script>

</body>
</html>
