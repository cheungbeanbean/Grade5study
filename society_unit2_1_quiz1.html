<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五下社會：清帝國時期臺灣的發展 - 移民開墾篇</title>
    <style>
        body { font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; background-color: #f0f2f5; color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #1a5276; border-bottom: 2px solid #1a5276; padding-bottom: 10px; }
        .quiz-info { text-align: center; margin-bottom: 30px; color: #7f8c8d; font-weight: bold; }
        .section-title { background: #eaf2f8; padding: 10px; border-left: 5px solid #2980b9; margin: 30px 0 15px 0; font-size: 1.2em; }
        .question-block { margin-bottom: 25px; padding: 15px; border-bottom: 1px solid #f1f1f1; transition: 0.3s; }
        .question-block:hover { background-color: #fafafa; }
        .question-title { font-weight: bold; margin-bottom: 12px; display: block; }
        .options label { display: block; margin: 8px 0; cursor: pointer; padding: 5px; border-radius: 4px; }
        .options label:hover { background-color: #e8f4fd; }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
        .submit-btn { display: block; width: 250px; height: 60px; margin: 40px auto; background-color: #27ae60; color: white; border: none; border-radius: 30px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(39,174,96,0.3); }
        .submit-btn:hover { background-color: #219150; transform: translateY(-2px); }
        #result { display: none; margin-top: 30px; padding: 30px; border-radius: 12px; border: 2px solid #27ae60; background-color: #fafffb; }
        #scoreText { font-size: 32px; text-align: center; color: #27ae60; margin-bottom: 20px; }
        .wrong-item { background: #fff5f5; border-left: 6px solid #e74c3c; padding: 20px; margin-top: 15px; border-radius: 8px; }
        .correct-ans { color: #27ae60; font-weight: bold; margin: 5px 0; }
        .user-ans-wrong { color: #e74c3c; font-weight: bold; }
        .explanation { font-size: 0.95em; color: #555; background: #fff; padding: 10px; border-radius: 4px; margin-top: 10px; border: 1px dashed #ccc; }
        .back-link { display: block; margin-bottom: 20px; text-decoration: none; color: #1a5276; font-weight: bold; }
        .history-section { margin-top: 50px; padding-top: 30px; border-top: 2px dashed #ddd; }
        .history-item { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #eee; }
        .history-item strong { color: #1a5276; }
        .clear-btn { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .clear-btn:hover { background: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <a href="#" class="back-link">⬅ 返回章節索引</a>
    <h1>社會科單元評量測驗</h1>
    <p class="quiz-info">主題：第一章 移民的開墾如何改變社會</p>
    
    <form id="quizForm">
        <div class="section-title">一、是非題 (每題 4 分)</div>
        <div id="tfContainer"></div>
        
        <div class="section-title">二、選擇題 (每題 4 分)</div>
        <div id="mcContainer"></div>
        
        <button type="button" class="submit-btn" onclick="submitQuiz()">交卷評分</button>
    </form>

    <div id="result">
        <div id="scoreText"></div>
        <div id="reviewArea"></div>
    </div>

    <div class="history-section">
        <h3>📊 測驗紀錄回顧</h3>
        <div id="historyList">尚無測驗紀錄</div>
        <button class="clear-btn" onclick="clearHistory()">清除所有紀錄</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'society_ch1_quiz_results';

    const tfQuestions = [
        { q: "清帝國在 1684 年將臺灣納入版圖，這是在施琅攻打臺灣之後發生的事。", a: "T", ex: "1683年施琅結束鄭氏統治，隔年清廷正式將臺灣納入版圖。" },
        { q: "清初頒布禁令限制漢人來臺，其中一項規定是不准攜帶家眷。", a: "T", ex: "為了防止臺灣成為反清基地，清廷限制移民需經批准且不准帶家人。" },
        { q: "早期漢人移民冒險偷渡來臺，主要是因為當時中國茶葉需求量大，想來臺種茶。", a: "F", ex: "主要是因為閩粵人口多土地少、糧食不足，且中國對「稻米」有需求。" },
        { q: "漢人興修水圳的主要目的，是為了在大雨時儲存雨水，平時則用來養魚賺錢。", a: "F", ex: "興建水圳是為了取得穩定灌溉水源，增加水稻種植面積以賺取收益。" },
        { q: "「械鬥」是指不同移民群體間，因語言風俗差異或爭奪水源利益而爆發的集體衝突。", a: "T", ex: "械鬥常見於不同籍貫或群體間，會造成社會動盪及人口遷移。" },
        { q: "民變中的「朱一貴事件」發生主因，是因他不滿地方官員徵收不合理的稅金。", a: "T", ex: "朱一貴率眾反抗官府腐敗與壓迫，是清代著名的民變之一。" },
        { q: "清帝國為了區隔漢人與原住民族，曾畫設界線（如舊界線、新界線）來隔離雙方。", a: "T", ex: "目的是避免漢人侵犯山區原住民族，但漢人仍常越界開墾。" },
        { q: "「八堡圳」是清代規模最大的水利設施，主要灌溉當時的鳳山地區。", a: "F", ex: "八堡圳位於「彰化」地區；鳳山地區的主要水圳是曹公圳。" },
        { q: "清廷在朱一貴事件後，為了加強管理而增設行政區，並在官府所在地建造簡易城牆。", a: "T", ex: "事件後清廷意識到統治缺口，開始增設行政區並加強防禦防禦設施。" },
        { q: "漢人開墾範圍擴大後，平埔族群因生活空間受擠壓，有些人被迫遷往埔里盆地。", a: "T", ex: "漢人大量移入導致平埔族土地流失，迫使部分族群向內陸遷移。" }
    ];

    const mcQuestions = [
        { q: "清帝國初期，漢人來臺灣開墾主要種植哪一種農作物？", options: ["茶葉", "咖啡", "水稻", "橡膠"], a: 2, ex: "臺灣自然環境適合種植水稻，且當時中國對稻米有需求。" },
        { q: "下列哪一條水圳主要灌溉今日新北市新店、臺北市大安與文山一帶？", options: ["八堡圳", "瑠公圳", "曹公圳", "嘉南大圳"], a: 1, ex: "瑠公圳由郭錫瑠父子興建，供應臺北盆地的灌溉。" },
        { q: "關於「八堡圳」的敘述，下列何者正確？", options: ["位於今高雄市", "引濁水溪的水灌溉", "由曹謹號召興建", "主要種植咖啡豆"], a: 1, ex: "八堡圳位於彰化，由施世榜籌建，引濁水溪水灌溉八個堡。" },
        { q: "清代臺灣俗諺「三年一小反，五年一大亂」是在形容當時什麼社會狀況？", options: ["商業貿易頻繁", "水利工程艱難", "地震頻繁發生", "民變與動亂頻傳"], a: 3, ex: "這句話形容清代官府管理失當，導致群眾反抗事件（民變）層出不窮。" },
        { q: "早期移民在械鬥失敗後常被迫遷移，如艋舺的衝突間接促成了哪個地區的開發？", options: ["大稻埕", "安平港", "鹿港", "打狗"], a: 0, ex: "艋舺械鬥落敗群體遷往大稻埕，利用淡水河運發展貿易而使該地興盛。" },
        { q: "清廷畫設「土牛溝」或界線的主要目的是什麼？", options: ["標示土地所有權", "防止漢人侵占原住民土地", "作為賽跑的路線", "測量臺灣海峽寬度"], a: 1, ex: "畫設界線是為了隔離漢人與原住民族，避免發生衝突。" },
        { q: "哪一項設施是興建八堡圳時，用來築堤攔水的重要工具？", options: ["水泥牆", "石筍（竹籠裝石）", "抽水機", "塑膠水管"], a: 1, ex: "相傳受林先生指導，使用藤竹編成的「石筍」才順利攔水。" },
        { q: "「曹公圳」的興建主要是為了解決哪一個地區的旱象？", options: ["彰化", "臺北", "高雄", "花蓮"], a: 2, ex: "曹公圳位於今高雄地區（鳳山、大寮等），由地方官曹謹主持興修。" },
        { q: "漢人移民渡海來臺必須經過的「黑水溝」是指哪裡？", options: ["淡水河", "長江", "濁水溪", "臺灣海峽"], a: 3, ex: "臺灣海峽風浪險惡、水色深沉，被移民稱為黑水溝。" },
        { q: "朱一貴事件後，清廷在臺灣增設行政區，這代表了什麼意義？", options: ["放棄統治臺灣", "鼓勵更多民變", "積極加強地方管理", "準備撤回中國"], a: 2, ex: "透過增設行政區與修築簡易城牆，政府試圖強化對臺灣社會的控制。" },
        { q: "下列哪一個群體因漢人開墾範圍擴大，導致生活空間被壓縮最嚴重？", options: ["荷蘭人", "原住民族", "日本商人", "西方傳教士"], a: 1, ex: "隨著漢人開墾擴大，平埔族與山區原住民族的生活空間都日益縮小。" },
        { q: "在興建水圳的過程中，除了增加農耕面積，還對聚落產生什麼影響？", options: ["導致所有漢人離開", "帶動了聚落的發展", "讓大家不再種田", "摧毀了所有的城牆"], a: 1, ex: "穩定的水源讓農業發達，也促使人口聚集形成更具規模的聚落。" },
        { q: "清廷最初限制漢人渡臺，主要考量是什麼？", options: ["擔心臺灣人口過多", "怕臺灣人去中國搶土地", "防止臺灣成為反清基地", "為了推廣觀光"], a: 2, ex: "清廷擔憂臺灣再次成為反清勢力的溫床，因此實施嚴格的渡臺禁令。" },
        { q: "施世榜籌資興建八堡圳，主要解決了彰化地區什麼樣的農業困擾？", options: ["雨量太多造成淹水", "土質太硬無法翻耕", "冬季水量少導致灌溉不穩", "野豬太多破壞作物"], a: 2, ex: "當地河流受降雨影響，枯水期水源不穩，需水圳穩定引水。" },
        { q: "漢人移民與平埔族群發生衝突，除了土地爭奪外，還可能因為什麼原因？", options: ["電視節目的愛好不同", "風俗習慣的差異", "為了決定誰當皇帝", "比賽捕魚技術"], a: 1, ex: "語言、習慣與風俗的巨大差異，常是移民與原住民發生衝突的原因。" }
    ];

    function init() {
        const tfArea = document.getElementById('tfContainer');
        tfQuestions.forEach((q, i) => {
            tfArea.innerHTML += `
                <div class="question-block">
                    <span class="question-title">${i + 1}. ${q.q}</span>
                    <div class="options">
                        <label><input type="radio" name="tf${i}" value="T"> 正確 (○)</label>
                        <label><input type="radio" name="tf${i}" value="F"> 錯誤 (╳)</label>
                    </div>
                </div>`;
        });

        const mcArea = document.getElementById('mcContainer');
        mcQuestions.forEach((q, i) => {
            let opts = q.options.map((opt, idx) => `
                <label><input type="radio" name="mc${i}" value="${idx}"> ${opt}</label>
            `).join('');
            mcArea.innerHTML += `
                <div class="question-block">
                    <span class="question-title">${i + 1}. ${q.q}</span>
                    <div class="options">${opts}</div>
                </div>`;
        });
    }

    function submitQuiz() {
        let totalScore = 0;
        let reviewHtml = '<h2>錯題回顧與解析</h2>';
        let wrongCount = 0;
        let mistakes = [];

        tfQuestions.forEach((item, i) => {
            const selected = document.querySelector(`input[name="tf${i}"]:checked`);
            const userAns = selected ? selected.value : null;
            if (userAns === item.a) {
                totalScore += 4;
            } else {
                wrongCount++;
                const userDisplay = userAns === "T" ? "○" : (userAns === "F" ? "╳" : "未答");
                const correctDisplay = item.a === "T" ? "○" : "╳";
                reviewHtml += createReviewItem(i+1, "是非題", item.q, userDisplay, correctDisplay, item.ex);
                mistakes.push({ question: item.q, user: userDisplay, correct: correctDisplay });
            }
        });

        mcQuestions.forEach((item, i) => {
            const selected = document.querySelector(`input[name="mc${i}"]:checked`);
            const userAns = selected ? parseInt(selected.value) : null;
            if (userAns === item.a) {
                totalScore += 4;
            } else {
                wrongCount++;
                const userDisplay = userAns === null ? "未答" : item.options[userAns];
                const correctDisplay = item.options[item.a];
                reviewHtml += createReviewItem(i+1, "選擇題", item.q, userDisplay, correctDisplay, item.ex);
                mistakes.push({ question: item.q, user: userDisplay, correct: correctDisplay });
            }
        });

        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        history.push({
            date: new Date().toLocaleString(),
            score: totalScore,
            total: 100,
            mistakes: mistakes
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));

        document.getElementById('scoreText').innerHTML = `您的總分：${totalScore} / 100`;
        document.getElementById('reviewArea').innerHTML = wrongCount > 0 ? reviewHtml : '<p style="color:green; text-align:center; font-size:1.5em;">太棒了！你對開墾時期的歷史瞭若指掌！</p>';
        document.getElementById('result').style.display = 'block';
        displayHistory();
        window.scrollTo({ top: document.getElementById('result').offsetTop, behavior: 'smooth' });
    }

    function displayHistory() {
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        const historyList = document.getElementById('historyList');
        if (history.length === 0) {
            historyList.innerHTML = "尚無測驗紀錄";
            return;
        }
        historyList.innerHTML = history.slice().reverse().map((item, idx) => `
            <div class="history-item">
                <strong>第 ${history.length - idx} 次測驗 - ${item.date}</strong><br>
                得分：<span style="color: #27ae60; font-weight: bold;">${item.score} / ${item.total}</span>
                <details style="margin-top: 10px;">
                    <summary style="cursor: pointer; color: #1a5276;">查看詳情</summary>
                    <div style="margin-top: 10px; font-size: 0.9em; border-top: 1px solid #eee; padding-top: 10px;">
                        ${item.mistakes.length > 0 ? item.mistakes.map(m => `
                            <p style="margin-bottom: 8px;">
                                <strong>問：</strong>${m.question}<br>
                                <span style="color: #e74c3c;">答：${m.user}</span> | <span style="color: #27ae60;">正：${m.correct}</span>
                            </p>
                        `).join('') : "全部正確！"}
                    </div>
                </details>
            </div>
        `).join('');
    }

    function clearHistory() {
        if (confirm("確定要清除所有測驗紀錄嗎？")) {
            localStorage.removeItem(STORAGE_KEY);
            displayHistory();
        }
    }

    function createReviewItem(no, type, q, user, correct, ex) {
        return `
            <div class="wrong-item">
                <strong>[${type} 第 ${no} 題]</strong> ${q}
                <div class="user-ans-wrong">您的回答：${user}</div>
                <div class="correct-ans">正確答案：${correct}</div>
                <div class="explanation">💡 學習點：${ex}</div>
            </div>`;
    }

    window.onload = function() {
        init();
        displayHistory();
    };
</script>

</body>
</html>
